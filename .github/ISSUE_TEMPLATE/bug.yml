name: Bug report
description: Reproducible defect using sanitized evidence
title: "[Bug] "
labels: ["type: bug", "status: needs-triage"]
body:
  - type: input
    id: version
    attributes: {label: Version or commit}
    validations: {required: true}
  - type: textarea
    id: reproduce
    attributes: {label: Minimal reproduction, description: Use synthetic or sanitized data only.}
    validations: {required: true}
  - type: textarea
    id: expected
    attributes: {label: Expected and actual behavior}
    validations: {required: true}
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy confirmation
      options:
        - label: I included no secrets, personal data, client report or proprietary scanner export.
          required: true
