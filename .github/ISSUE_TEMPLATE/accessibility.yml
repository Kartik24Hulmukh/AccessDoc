name: Accessibility report
description: Report a barrier in the web UI, generated report, docs or CLI
labels: ["type: accessibility", "status: needs-triage"]
body:
  - type: dropdown
    id: surface
    attributes: {label: Surface, options: ["Web UI", "Generated PDF", "Documentation", "CLI/API"]}
    validations: {required: true}
  - type: textarea
    id: environment
    attributes: {label: Browser, OS, assistive technology and versions}
  - type: textarea
    id: task
    attributes: {label: Task, steps, expected outcome and observed barrier}
    validations: {required: true}
  - type: textarea
    id: impact
    attributes: {label: User impact}
    validations: {required: true}
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy confirmation
      options:
        - label: I included no confidential or personal evidence.
          required: true
