name: Parser or parser or mapping compatibility review
description: Propose or challenge a scanner-rule parser or mapping
title: "Mapping review: "
labels: [catalog, needs-evidence]
body:
  - type: input
    id: scanner_rule
    attributes:
      label: Scanner and rule identifier
    validations:
      required: true
  - type: input
    id: source
    attributes:
      label: Authoritative source URL
    validations:
      required: true
  - type: textarea
    id: reasoning
    attributes:
      label: Proposed parser or mapping and reasoning
    validations:
      required: true
  - type: textarea
    id: counterexample
    attributes:
      label: Counterexample or uncertainty
    validations:
      required: true
